name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Test catalog tooling
        env:
          GOWORK: off
        run: go test ./...

      - name: Validate approved catalog
        env:
          GOWORK: off
        run: go run ./cmd/check-catalog
